            <input type="password" id="loginPassword" placeholder="Password" class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 text-white placeholder:text-slate-500 focus:border-green-500 outline-none transition">
            <button type="button" onclick="handleLogin()" class="w-full scholar-gradient text-white py-4 rounded-2xl font-bold hover:opacity-90 transition transform active:scale-[0.98]">Enter the Verse</button>
        </form>

        <form id="signupForm" class="space-y-4 hidden">
            <input type="text" id="signupName" placeholder="Full Name" class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 text-white placeholder:text-slate-500 focus:border-green-500 outline-none transition">

            <button type="button" onclick="toggleUniModal()" class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 text-left flex justify-between items-center group">
                <span id="selectedUniLabel" class="text-slate-500">Select your Uni</span>
                <i class="fas fa-university text-green-500"></i>
            </button>
            <input type="hidden" id="signupUniversity">

            <input type="password" id="signupPassword" placeholder="Create Password" class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 text-white placeholder:text-slate-500 focus:border-green-500 outline-none transition">
            <button type="button" onclick="handleSignup()" class="w-full scholar-gradient text-white py-4 rounded-2xl font-bold hover:opacity-90 transition transform active:scale-[0.98]">Join the Verse Scholars</button>
        </form>
    </div>

        function switchTab(type) {
            const isLogin = type === 'login';
            document.getElementById('loginForm').classList.toggle('hidden', !isLogin);
            document.getElementById('signupForm').classList.toggle('hidden', isLogin);
            
            const loginBtn = document.getElementById('loginTab');
            const signupBtn = document.getElementById('signupTab');
            
            if(isLogin) {
                loginBtn.className = "w-1/2 py-3 text-sm font-bold rounded-xl bg-green-500 text-white shadow-lg shadow-green-500/20";
                signupBtn.className = "w-1/2 py-3 text-sm font-bold rounded-xl text-slate-400";
            } else {
                signupBtn.className = "w-1/2 py-3 text-sm font-bold rounded-xl bg-green-500 text-white shadow-lg shadow-green-500/20";
                loginBtn.className = "w-1/2 py-3 text-sm font-bold rounded-xl text-slate-400";
            }
        }

        function toggleUniModal() {
            const modal = document.getElementById('uniModal');
            modal.classList.toggle('hidden');
            if (document.getElementById('uniList').innerHTML.trim() === "") {
                // Use data attributes + encoder to avoid breaking the inline onclick when
                // university names contain quotes. selectUniFromElement will decode.
                document.getElementById('uniList').innerHTML = nigerianUnis.map(uni => `
                    <div data-uni="${encodeURIComponent(uni)}" onclick="selectUniFromElement(this)" class="p-4 bg-white/5 border border-white/5 rounded-2xl text-slate-300 hover:bg-green-500/10 hover:border-green-500/30 cursor-pointer transition flex items-center gap-3">
                        <div class="w-8 h-8 rounded-lg bg-green-500/20 text-green-500 flex items-center justify-center font-bold text-xs">${uni[0]}</div>
                        ${uni}
                    </div>
                `).join('');
            }
        }

        function selectUni(name) {
            document.getElementById('signupUniversity').value = name;
            document.getElementById('selectedUniLabel').innerText = name;
            document.getElementById('selectedUniLabel').className = "text-white font-medium";
            toggleUniModal();
        }

        function selectUniFromElement(el) {
            try {
                const encoded = el.dataset.uni || '';
                const name = decodeURIComponent(encoded);
                selectUni(name);
            } catch (e) {
                console.error('Failed to select uni from element', e);
            }
        }

        async function handleSignup() {
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const name = document.getElementById('signupName').value;
            const uni = document.getElementById('signupUniversity').value;

            if(!email || !password || !uni) return alert("All fields are required to join the Core.");

            const { data, error } = await _supabase.auth.signUp({
                email, password, options: { data: { full_name: name, university: uni } }
            });

            if (error) alert(error.message);
            else {
                alert("Success! Welcome to CampusCORE.");
                window.location.href = 'dashboard.html';
            }
        }

        async function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
            if (error) alert(error.message);
            else window.location.href = 'dashboard.html';
        }
